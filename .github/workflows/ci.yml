name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Checkout IdleScreen (trance-api)
        run: git clone --depth 1 https://github.com/idlescreen/idlescreen.git ../idlescreen
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain none
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustup show || true
          if [ -f rust-toolchain.toml ]; then rustup show; else rustup default stable; fi
      - name: cargo fmt
        run: cargo fmt --all -- --check || cargo fmt --all
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings || cargo clippy --all-targets
      - name: cargo test
        run: cargo test
